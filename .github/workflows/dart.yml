name: DART 공시 실시간 모니터링

on:
  # 5분마다 자동 실행
  schedule:
    - cron: "*/5 * * * *"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  run-dart:
    runs-on: ubuntu-latest

    steps:
      # 1) 코드 체크아웃
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2) Python 세팅
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) 의존성 설치
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4) 캐시 복원 (DART 중복 체크 + 기업 리스트)
      - name: Restore DART cache
        uses: actions/cache@v4
        with:
          path: |
            dart_seen_filings.json
            dart_corp_list.json
          key: dart-cache-${{ github.run_id }}
          restore-keys: dart-cache-

      # 5) DART 모니터링 실행
      - name: Run DART Monitor
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python dart_monitor.py
